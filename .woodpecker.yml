# Codeberg CI (Woodpecker). Runs on every push: validate + build + smoke +
# Playwright e2e. Firefox is best-effort (non-blocking job); Chromium and
# WebKit block the pipeline.
# The image tag must match the @playwright/test version in package.json —
# scripts/update-snapshots.sh derives it the same way for baseline parity.
when:
  - event: [push, pull_request]

steps:
  - name: validate
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    commands:
      - npm ci
      - npm run validate

  - name: build-and-smoke
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    commands:
      - npm run build
      - npm run build:single
      - npm run size-check
      - npm run payload-check
      - npm run smoke

  - name: e2e
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    commands:
      - npx playwright test --project=chromium --project=webkit

  - name: e2e-firefox
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    failure: ignore
    commands:
      - npx playwright test --project=firefox

  # Deploys the hosted app to the Cloudflare Pages project `read-html`
  # (§1); READ.html rides along as a downloadable artifact at /READ.html.
  # Requires the woodpecker secrets cloudflare_api_token and
  # cloudflare_account_id (§11 owner action).
  - name: deploy
    image: node:22
    environment:
      CLOUDFLARE_API_TOKEN:
        from_secret: cloudflare_api_token
      CLOUDFLARE_ACCOUNT_ID:
        from_secret: cloudflare_account_id
    commands:
      - cp dist-single/READ.html dist/READ.html
      - npx wrangler@4 pages deploy dist --project-name read-html --branch main
    when:
      - event: push
        branch: main
